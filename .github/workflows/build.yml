name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      yank_note_version:
        description: 'Yank Note version (e.g., 3.87.1). Leave empty to use latest.'
        required: false
        default: ''
      image_tag:
        description: 'Docker image tag suffix (e.g., latest, v1). Image will be ghcr.io/<owner>/yank-note-docker:<tag>'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}

      - name: Determine Yank Note version
        id: yn_version
        run: |
          if [ -n "${{ inputs.yank_note_version }}" ]; then
            VERSION="${{ inputs.yank_note_version }}"
          else
            VERSION=$(curl -sX GET "https://api.github.com/repos/purocean/yn/releases/latest" | grep '"tag_name"' | sed -E 's/.*"tag_name".*"v?([^"]+)".*/\1/')
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using Yank Note version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            YANK_NOTE_VERSION=${{ steps.yn_version.outputs.VERSION }}
            VERSION=${{ steps.yn_version.outputs.VERSION }}
            BUILD_DATE=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
